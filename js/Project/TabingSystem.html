<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .tab-btn.active {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="tabs">
      <div class="tab-buttons">
        <button class="tab-btn active" onclick="openTab(0)">Tab 1</button>
        <button class="tab-btn" onclick="openTab(1)">Tab 2</button>
        <button class="tab-btn" onclick="openTab(2)">Tab 3</button>
      </div>

      <div class="tab-contents">
        <div class="tab-content active">Content of Tab 1</div>
        <div class="tab-content">Content of Tab 2</div>
        <div class="tab-content">Content of Tab 3</div>
      </div>
    </div>
    <script>
      function openTab(index) {
        let buttons = document.querySelectorAll(".tab-btn");
        let contents = document.querySelectorAll(".tab-content");

        buttons.forEach((btn) => btn.classList.remove("active"));
        contents.forEach((con) => con.classList.remove("active"));

        buttons[index].classList.add("active");
        contents[index].classList.add("active");
      }
    </script>
  </body>
</html>
