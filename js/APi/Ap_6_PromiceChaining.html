      // ✅ Simulated async function that returns a Promise
      function getData(id) {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            console.log(`User Data for ID: ${id}`);
            if (resolve) {
              resolve("Success");
            } else {
              reject("Error");
            }
          }, 1000); // 2 seconds delay
        });
      }

      // ✅ Promise chaining
      getData(1)
        .then(() => getData(2))
        .then(() => getData(3))
        .then(() => getData(4))
        .then(() => getData(5))
        .then((res) => {
          getData(6);
          console.log(res);
        })
        .catch((err) => {
          console.log("Error occurred:", err);
        });
    </script>
