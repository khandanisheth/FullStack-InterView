<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .post {
        border: 1px solid #ccc;
        padding: 15px;
        margin: 10px;
        border-radius: 8px;
        background-color: #f9f9f9;
      }
      h3 {
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <h1>📘 Total Calculator (a + b + c)</h1>
    <div class="container"></div>
    <script>
      const apiUrl = "https://fakestoreapi.com/products/1";

      async function createPost() {
        const response = await fetch(apiUrl, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            title: "foo",
            price: 999,
            description: "Updated product",
          }),
        });

        const data = await response.json();
        return data;
      }

      async function main() {
        const result = await createPost();
        console.log(result);
      }

      main();
    </script>
  </body>
</html>

<!-- 
| Feature                             | Purpose                                         |
| ----------------------------------- | ----------------------------------------------- |
| `fetch(..., {method: "POST", ...})` | Server ko new data bhejna                       |
| `JSON.stringify()`                  | JavaScript object ko JSON me convert karna      |
| `headers: Content-Type`             | Server ko batana ki data kis format me jaa raha |
| `await fetch` + `await .json()`     | Async style se response read karna              |
 -->
