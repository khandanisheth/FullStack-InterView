<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // ✅ Function that returns a promise
      let getPromise = () => {
        return new Promise((res, rej) => {
          console.log("This is the start of the Promise");

          // Uncomment one of these based on what you want to test
          res("Success"); // If you want to test resolve
        //   rej("Error"); // If you want to test reject
        });
        console.log("This is the end of the Promise");
      };

      // ✅ Get the promise from function
      let promise = getPromise();

      // ✅ Handle success using .then()
      promise
        .then((res) => {
          console.log("Promise Resolved: ", res);
        })

        // ✅ Handle error using .catch()
        .catch((err) => {
          console.log("Promise Rejected: ", err);
        });
    </script>
  </body>
</html>
