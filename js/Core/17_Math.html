<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>JavaScript Math Functions</title>
  </head>
  <body>
    <script type="text/javascript">
      // Math.abs() => kisi bhi number ka absolute (positive) value deta hai
      document.write("<b>abs(-85) => </b>" + Math.abs(-85) + "<br>");

      // Math.max() => given numbers me se sabse bada number
      document.write("<b>max(5,54,65) => </b>" + Math.max(5, 54, 65) + "<br>");

      // Math.min() => given numbers me se sabse chhota number
      document.write("<b>min(5,54,45) => </b>" + Math.min(5, 54, 45) + "<br>");

      // Math.sqrt() => kisi number ka square root deta hai
      document.write("<b>sqrt(25) => </b>" + Math.sqrt(25) + "<br>");

      // Math.pow(a, b) => a ki power b (a^b)
      document.write("<b>pow(2,3) => </b>" + Math.pow(2, 3) + "<br>");

      // Math.floor() => number ko niche round karega (decimal hata dega)
      document.write("<b>floor(5.98) => </b>" + Math.floor(5.18) + "<br>");

      // Math.ceil() => number ko upar round karega
      document.write("<b>ceil(5.01) => </b>" + Math.ceil(5.01) + "<br>");

      // Math.round() => nearest integer par round karega
      document.write("<b>round(5.49) => </b>" + Math.round(5.49) + "<br>");
      document.write("<b>round(5.5) => </b>" + Math.round(5.5) + "<br>");

      // Math.random() => 0 se 1 ke beech random decimal number
      document.write("<b>random() => </b>" + Math.random(50) + "<br>");

      // Math.trunc() => sirf integer part dega (decimal hata dega)
      document.write("<b>trunc(5.67) => </b>" + Math.trunc(5.67) + "<br>");

      // Math.sign() => number positive hai, negative ya zero hai — ye batata hai
      // 1 => positive, -1 => negative, 0 => zero
      document.write("<b>sign(5) => </b>" + Math.sign(5) + "<br>");
      document.write("<b>sign(-5) => </b>" + Math.sign(-5) + "<br>");
      document.write("<b>sign(0) => </b>" + Math.sign(0) + "<br>");

      // Math.cbrt() => kisi number ka cube root deta hai
      document.write("<b>cbrt(27) => </b>" + Math.cbrt(27) + "<br>");

      // Math.log() => natural logarithm (base e) deta hai
      document.write("<b>log(10) => </b>" + Math.log(10) + "<br>");

      // Math.log10() => base 10 ka logarithm deta hai
      document.write("<b>log10(100) => </b>" + Math.log10(100) + "<br>");

      // Math.exp() => e^x deta hai (e=2.718...)
      document.write("<b>exp(2) => </b>" + Math.exp(2) + "<br>");

      // Math.PI => π ki value deta hai (3.14159...)
      document.write("<b>PI => </b>" + Math.PI + "<br>");

      // Math.E => e ki value deta hai (2.718...)
      document.write("<b>E => </b>" + Math.E + "<br>");

      // Math.sin() => radian value ka sine value deta hai
      document.write("<b>sin(0) => </b>" + Math.sin(0) + "<br>");

      // Math.cos() => radian value ka cosine value deta hai
      document.write("<b>cos(0) => </b>" + Math.cos(0) + "<br>");

      // Math.tan() => radian value ka tangent value deta hai
      document.write("<b>tan(0) => </b>" + Math.tan(0) + "<br>");
    </script>
  </body>
</html>
