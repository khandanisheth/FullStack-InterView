<!DOCTYPE html>
<html>
  <body>
    <h2>JavaScript All Loops Example</h2>

    <script>
      let numbers = [10, 20, 30, 40, 50]; // Array Example
      let person = {
        // Object Example
        name: "Danish", //   propertys
        age: 24,
        city: "Jaipur",
      };

      document.writeln("<h3>For Loop (Fixed count)</h3>");
      for (let i = 0; i < numbers.length; i++) {
        //  length  propertys
        document.writeln(numbers[i] + "<br>"); //
      }

      document.writeln("<h3>While Loop</h3>");
      let j = 0;
      while (j < numbers.length) {
        document.writeln(numbers[j] + "<br>");
        j++;
      }

      document.writeln("<h3>Do...While Loop</h3>");
      let k = 0;
      do {
        document.writeln(numbers[k] + "<br>");
        k++;
      } while (k < numbers.length);

      document.writeln("<h3>For...of Loop (Array values)</h3>");
      for (let value of numbers) {
        //    Array values
        document.writeln(value + "<br>" + numbers[1]);
      }

      document.writeln("<h3>For...in Loop (Object properties)</h3>");
      for (let key in person) {
        //   Object properties
        document.writeln(key + " : " + person[key] + "<br>");
      }

      document.writeln("<h3>forEach() Loop (Array operation)</h3>");
      numbers.forEach((num, index, array) => {
        document.writeln(index + " Square: " + num * num + "<br>");
      });

      //
      //     Yahan:

      // currentValue → array ka current element

      // index (optional) → us element ka index

      // array (optional) → pura array

      document.writeln("<h3>map() Loop (Create new array)</h3>");
      let doubleNumbers = numbers.map((num, index) => {
        return `${index} =>` + num * 2;
      });
      document.writeln(doubleNumbers + "<br>");
    </script>
  </body>
</html>
