<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let str = "Hello, welcome to JavaScript world";

      // 1️⃣ indexOf()
      // Pehli baar 'JavaScript' kaha aata hai, uski position (index) dega
      console.log(str.indexOf("JavaScript")); // 18

      // Agar substring na mile to -1
      console.log(str.indexOf("Python")); // -1

      // 2️⃣ lastIndexOf()
      // Substring ki aakhri occurrence ki position dega
      let str2 = "Hello world, welcome to the new world!";
      console.log(str2.lastIndexOf("world")); // 31

      // 3️⃣ search()
      // Regular expression ya simple string se search karta hai, pehla match ka index deta hai
      console.log(str.search("JavaScript")); // 18

      // Regular Expression ke sath
      console.log(str.search(/welcome/i)); // 7 (case-insensitive search)

      // 4️⃣ includes()
      // Ye check karta hai ki string me substring hai ya nahi (true/false)
      console.log(str.includes("JavaScript")); // true
      console.log(str.includes("Python")); // false

      // 5️⃣ startsWith()
      // Ye check karega ki string kis substring se start ho rahi hai
      console.log(str.startsWith("Hello")); // true
      console.log(str.startsWith("welcome")); // false

      // 6️⃣ endsWith()
      // Ye check karega ki string kis substring pe end ho rahi hai
      console.log(str.endsWith("world")); // true
      console.log(str.endsWith("JavaScript")); // false
    </script>
  </body>
</html>
<!-- 


indexOf() → pehla match

lastIndexOf() → last match

search() → regex ya string se pehla match

includes() → true/false (hai ya nahi)

startsWith() → true/false (start se check)

endsWith() → true/false (end se check)-->
