<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let arr = [1, 2, 3, 4, 5];

      // 1. length - Array की कुल लंबाई
      console.log(arr.length);

      // 2. toString() - Array को string में बदलता है
      console.log(arr.toString());

      // 3. join() - Array को string में बदलता है लेकिन custom separator के साथ
      console.log(arr.join(" - "));

      // 4. delete - एक specific index का value delete करता है (undefined रह जाता है)
      delete arr[2];
      console.dir("delete", arr);

      // 5. concat() - दो arrays को जोड़ता है और नया array बनाता है
      console.log(arr.concat([6, 7]));

      // 6. flat() - nested array को flatten करता है
      let nested = [1, [2, 3], [2, 3], [4, [5]]];
      console.log(nested.flat(2));

      // 7. push() - नए elements को अंत में जोड़ता है
      arr.push(6);
      console.log(arr);

      // 8. unshift() - नए elements को शुरू में जोड़ता है
      arr.unshift(0);
      console.log(arr);

      // 9. pop() - आखिरी element हटाता है
      arr.pop();
      console.log(arr);

      // 10. shift() - पहला element हटाता है
      arr.shift();
      console.log(arr);

      // 11. splice() - किसी भी जगह से element हटाता या जोड़ता है
      arr.splice(2, 1, 10); // index 2 पर 1 element हटाओ और 10 जोड़ो splice(index,removeElement,addElement)
      console.log(arr);

      // 12. slice() - array का टुकड़ा return करता है (original array नहीं बदलता)
      let sliced = arr.slice(1, 3);
      console.log(sliced);

      // 13. some() - चेक करता है कि कोई एक element condition पूरा करता है या नहीं
      console.log(arr.some((x) => x > 3));

      // 14. map() - हर element पर operation करता है और नया array return करता है
      let mapped = arr.map((x) => x * 2);
      console.log(mapped);

      // 15. filter() - condition वाले elements को return करता है
      let filtered = arr.filter((x) => x % 2 === 0);
      console.log(filtered);

      // 16. reduce() - array के सभी elements को एक value में reduce करता है
      let reduced = arr.reduce((acc, curr) => acc + curr, 0);
      console.log(reduced);

      // 17. reverse() - array को उल्टा कर देता है
      console.log(arr.reverse());

      // 18. values() - array का iterator देता है
      let iter = arr.values();
      for (let val of iter) {
        console.log(val);
      }
    </script>
  </body>
</html>
