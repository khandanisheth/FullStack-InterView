<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let arr = [10, 20, 30, 40, 50];

      // 1️⃣ push()
      // Array ke last me element add karega
      arr.push(60);
      console.log(arr[0]);
      console.log(arr); // [10,20,30,40,50,60]

      // 2️⃣ pop()
      // Array ke last se element hatayega
      arr.pop();
      console.log(arr); // [10,20,30,40,50]

      // 3️⃣ unshift()
      // Array ke starting me element add karega
      arr.unshift(0);
      console.log(arr); // [0,10,20,30,40,50]

      // 4️⃣ shift()
      // Array ke starting se element hatayega
      arr.shift();
      console.log(arr); // [10,20,30,40,50]

      // 5️⃣ length
      // Array ki length (size) batata hai
      console.log(arr.length); // 5

      // 6️⃣ indexOf()
      // Kisi element ki index batata hai, nahi mile to -1
      console.log(arr.indexOf(30)); // 2

      // 7️⃣ lastIndexOf()
      // Last occurrence ki index batata hai
      let arr2 = [10, 20, 30, 20, 40];
      console.log(arr2.lastIndexOf(20)); // 3

      // 8️⃣ includes()
      // Check karta hai ki element array me hai ya nahi (true/false)
      console.log(arr.includes(40)); // true
      console.log(arr.includes(60)); // false

      // 9️⃣ join()
      // Array ko string me convert kar deta hai, separator ke sath
      console.log(arr.join("-")); // "10-20-30-40-50"

      // 🔟 toString()
      // Array ko comma separated string me convert karta hai
      console.log(arr.toString()); // "10,20,30,40,50"

      // 1️⃣1️⃣ concat()
      // 2 arrays ko jodta hai (naya array return karega)
      let arr3 = arr.concat(arr2);
      console.log(arr3); // [10,20,30,40,50,10,20,30,20,40]

      // 1️⃣2️⃣ slice()
      // Array ka naya part banata hai (original array nahi badlega)
      console.log(arr.slice(1, 4)); // [20,30,40]

      // 1️⃣3️⃣ splice()
      // Array se element hata bhi sakta hai aur add bhi (original array ko modify karta hai)
      // Syntax: array.splice(start, deleteCount, item1, item2,...)
      arr.splice(2, 1, 25); // 2nd index se 1 element hata kar 25 daala
      console.log(arr); // [10,20,25,40,50]

      // 1️⃣4️⃣ reverse()
      // Array ko ulta kar dega
      arr.reverse();
      console.log(arr); // [50,40,25,20,10]

      // 1️⃣5️⃣ sort()
      // Array ko alphabetically ya number wise (as string) sort karega
      let numbers = [5, 2, 8, 1, 4];
      numbers.sort();
      console.log(numbers); // [1,2,4,5,8]

      // Number wise sort karna ho to
      numbers.sort((a, b) => a - b);
      console.log(numbers); // [1,2,4,5,8]

      // 1️⃣6️⃣ map()
      // Har element pe function lagata hai, aur naya array banata hai
      let doubled = arr.map((x) => x * 2);
      console.log(doubled); // [100,80,50,40,20]

      // 1️⃣7️⃣ filter()
      // Condition ke hisaab se elements ka naya array banata hai
      let filtered = arr.filter((x) => x > 25);
      console.log(filtered); // [50,40]

      // 1️⃣8️⃣ reduce()
      // Sab elements pe operation karke single value return karta hai
      let sum = arr.reduce((total, value) => total + value, 0);
      console.log(sum); // 50+40+25+20+10 = 145

      // 1️⃣9️⃣ forEach()
      // Har element pe function chalata hai, value return nahi karta
      arr.forEach((item) => {
        console.log("Value: " + item);
      });

      // 2️⃣0️⃣ find()
      // Pehla matching element return karega
      let found = arr.find((x) => x > 30);
      console.log(found); // 50

      // 2️⃣1️⃣ findIndex()
      // Pehle matching element ka index dega
      let index = arr.findIndex((x) => x > 30);
      console.log(index); // 0 (kyuki 50 pehle hai)

      // 2️⃣2️⃣ every()
      // Check karega ki sab elements condition satisfy karte hain ya nahi
      console.log(arr.every((x) => x > 0)); // true

      // 2️⃣3️⃣ some()
      // Check karega ki koi ek bhi element condition satisfy karta hai ya nahi
      console.log(arr.some((x) => x > 45)); // true

      // 2️⃣4️⃣ flat()
      // Nested array ko flatten kar dega
      let nestedArr = [1, 2, [3, 4], 5];
      console.log(nestedArr.flat()); // [1,2,3,4,5]

      // 2️⃣5️⃣ fill()
      // Pure array me ya kisi part me ek hi value bhar dega
      let fillArr = [1, 2, 3, 4];
      fillArr.fill(0, 1, 3);
      console.log(fillArr); // [1,0,0,4]
    </script>
  </body>
</html>
