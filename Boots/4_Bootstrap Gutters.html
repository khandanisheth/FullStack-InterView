<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport for responsive behaviour -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Gutters Example</title>

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      /* Common box style for all examples */
      .box {
        background-color: #0d6efd; /* blue */
        color: white;
        padding: 20px;
        text-align: center;
        font-weight: bold;
        border-radius: 6px;
      }

      .box.alt {
        background-color: #198754; /* green */
      }
    </style>
  </head>
  <body>
    <div class="container my-4">
      <!-- ==================================================
         EXAMPLE 1: DEFAULT GUTTERS
         Bootstrap by default columns ke beech spacing deta hai
    ================================================== -->
      <h4>1️⃣ Default Gutters</h4>
      <div class="row">
        <div class="col-6">
          <div class="box">Box 1</div>
        </div>
        <div class="col-6">
          <div class="box alt">Box 2</div>
        </div>
      </div>

      <hr />

      <!-- ==================================================
         EXAMPLE 2: NO GUTTERS (g-0)
         g-0 ka matlab columns ke beech koi gap nahi
    ================================================== -->
      <h4>2️⃣ No Gutters (g-0)</h4>
      <div class="row g-0">
        <div class="col-6">
          <div class="box">Box 1</div>
        </div>
        <div class="col-6">
          <div class="box alt">Box 2</div>
        </div>
      </div>

      <hr />

      <!-- ==================================================
         EXAMPLE 3: MEDIUM GUTTERS (g-3)
         g-3 medium level ka gap deta hai (horizontal + vertical)
    ================================================== -->
      <h4>3️⃣ Medium Gutters (g-3)</h4>
      <div class="row g-3">
        <div class="col-6">
          <div class="box">Box 1</div>
        </div>
        <div class="col-6">
          <div class="box alt">Box 2</div>
        </div>
        <div class="col-6">
          <div class="box">Box 3</div>
        </div>
        <div class="col-6">
          <div class="box alt">Box 4</div>
        </div>
      </div>

      <hr />

      <!-- ==================================================
         EXAMPLE 4: HORIZONTAL & VERTICAL GUTTERS ALAG-ALAG
         gx-* → left-right spacing
         gy-* → top-bottom spacing
    ================================================== -->
      <h4>4️⃣ Horizontal (gx-4) & Vertical (gy-2) Gutters</h4>
      <div class="row gx-4 gy-2">
        <div class="col-6">
          <div class="box">Box 1</div>
        </div>
        <div class="col-6">
          <div class="box alt">Box 2</div>
        </div>
        <div class="col-6">
          <div class="box">Box 3</div>
        </div>
        <div class="col-6">
          <div class="box alt">Box 4</div>
        </div>
      </div>
    </div>
  </body>
</html>
