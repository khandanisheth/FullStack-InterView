<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .col-6 {
        border: 2px solid red;
      }

      .box {
        border: 1px solid rgb(92, 158, 103);
      }

      .box div {
        border: 1px solid rgb(33, 34, 129);
      }
    </style>
  </head>
  <body>
    <div class="container" style="border: 5px solid">
      <div class="row">
        <div class="col-6">
          <div class="box mx-1 my-1">
            <div class="w-50">1</div>
          </div>
        </div>

        <div class="col-6">
          <div class="box mx-1 my-1">
            <div class="w-50">1</div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-6">
          <div class="box mx-1 my-1">
            <div class="w-50">1</div>
          </div>
        </div>

        <div class="col-6">
          <div class="box mx-1 my-1">
            <div class="w-50">1</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
