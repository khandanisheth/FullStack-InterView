<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grid Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .box {
        border: 1px solid black;
      }

      .col-6 {
        border: 2px solid red;
      }

      .col {
        border: 1px solid rgb(92, 158, 103);
      }
    </style>
  </head>
  <body>
    <div class="container" style="border: 5px solid">
      <div class="row">
        <div class="col-6">
          <div class="col mx-1 my-1">1</div>
        </div>
        <div class="col-6"><div class="col mx-1 my-1">1</div></div>
      </div>

      <div class="row">
        <div class="col-6"><div class="col mx-1 my-1">1</div></div>
        <div class="col-6"><div class="col mx-1 my-1">1</div></div>
      </div>
    </div>
  </body>
</html>
