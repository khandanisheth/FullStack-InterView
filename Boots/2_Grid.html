<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Grid Example</title>

    <!-- Bootstrap 5 CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Container to center content and add padding -->
    <div class="container-fluid mt-5">
      <!-- Row starts here -->
      <div class="row">
        <!-- First column: Mobile full width (12), Tablet half (6), Desktop 4 columns -->
        <div class="col-12 col-md-6 col-lg-3 mb-4">
          <div class="card h-100 text-center">
            <div class="card-body">
              <h5 class="card-title">Card 1</h5>
              <p class="card-text">Yeh card responsive hai.</p>
            </div>
          </div>
        </div>

        <!-- Second column: Same setup -->
        <div class="col-12 col-md-6 col-lg-3 mb-4">
          <div class="card h-100 text-center">
            <div class="card-body">
              <h5 class="card-title">Card 2</h5>
              <p class="card-text">Mobile par 100%, Tablet par 50%, Desktop par 33% width.</p>
            </div>
          </div>
        </div>

        <!-- Third column: Same setup -->
        <div class="col-12 col-md-6 col-lg-3 mb-4">
          <div class="card h-100 text-center">
            <div class="card-body">
              <h5 class="card-title">Card 3</h5>
              <p class="card-text">Bootstrap Grid System ka use kiya gaya hai.</p>
            </div>
          </div>
        </div>

        <!-- Fourth column: Extra card to show wrapping -->
        <div class="col-12 col-md-6 col-lg-3 mb-4">
          <div class="card h-100 text-center">
            <div class="card-body">
              <h5 class="card-title">Card 4</h5>
              <p class="card-text">Agar cards jyada ho, to neeche wrap ho jaate hain.</p>
            </div>
          </div>
        </div>
      </div>
      <!-- Row ends here -->
    </div>
    <!-- Container ends here -->

    <!-- Bootstrap 5 JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
<!-- 

sm = 576px
md = 768px
lg = 992px
xl = 1200px
xxl = 1400px

 -->
