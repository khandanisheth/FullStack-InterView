<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding -->
    <meta charset="UTF-8" />
    <!-- Responsive layout on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hide Odd List Items</title>
    <!-- ✅ Bootstrap CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <!-- ✅ jQuery CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- ✅ Inline jQuery Script -->
    <script>
      $(document).ready(function () {
        $(".hide").click(function () {
          $("ul li:odd").hide(1000);
        });

        $(".show").click(function () {
          $("ul li:odd").show(2000);
        });
      });
    </script>
    <!-- ✅ Inline jQuery Script -->
    <script>
      $(document).ready(function () {
        $(".hidelast").click(function () {
          $("ul li:last").hide(1000);
        });

        $(".showlast").click(function () {
          $("ul li:last").show(1000);
        });
      });
    </script>

    <script>
      $(document).ready(function () {
        $(".hidelastchild").click(function () {
          $("ul li:first-child").hide(1000);
        });

        $(".showlastchild").click(function () {
          $("ul li:first-child").show(1000);
        });
      });
    </script>
  </head>

  <body class="bg-light">
    <!-- ✅ Bootstrap container for layout -->
    <div class="container py-5">
      <!-- Page Heading -->
      <h2 class="mb-4 text-center text-primary">jQuery List Hide/Show</h2>
      <!-- Buttons -->
      <div class="mb-4 text-center">
        <button class="btn btn-danger hide me-3">Hide Odd Items</button>
        <button class="btn btn-success show">Show Odd Items</button>
      </div>

      <h2 class="mb-4 text-center text-primary">jQuery List Hide/Show Last Item</h2>
      <div class="mb-4 text-center">
        <button class="btn btn-danger hidelast me-3">Hide Items Last</button>
        <button class="btn btn-success showlast">Show Items Show</button>
      </div>

      <h2 class="mb-4 text-center text-primary">jQuery List First-Child</h2>
      <div class="mb-4 text-center">
        <button class="btn btn-danger hidelastchild me-3">Hide Items First-Child</button>
        <button class="btn btn-success showlastchild">Show Items First-Child</button>
      </div>
      <!-- List -->
      <ul class="list-group w-50 mx-auto">
        <li class="list-group-item">mango0</li>
        <li class="list-group-item">mango1</li>
        <li class="list-group-item">mango2</li>
        <li class="list-group-item">mango3</li>
        <li class="list-group-item">mango4</li>
        <li class="list-group-item">mango5</li>
        <li class="list-group-item">mango6</li>
      </ul>
    </div>

    <!-- ✅ Bootstrap JS (required for some features, like modals if needed) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
