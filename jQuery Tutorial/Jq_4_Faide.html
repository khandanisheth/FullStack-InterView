<!DOCTYPE html>
<html>
  <head>
    <title>jQuery Fading Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <p id="para">This is a fading paragraph.</p>
    <button id="fadeOut">Fade Out</button>
    <button id="fadeIn">Fade In</button>
    <button id="fadeToggle">Fade Toggle</button>
    <button id="fadeTo">Fade To 50%</button>

    <script>
      $(document).ready(function () {
        $("#fadeOut").click(function () {
          $("#para").fadeOut(1000); // 1 sec me dheere se hide hoga
        });

        $("#fadeIn").click(function () {
          $("#para").fadeIn(1000); // 1 sec me wapas visible hoga
        });

        $("#fadeToggle").click(function () {
          $("#para").fadeToggle(1000); // toggle karega
        });

        $("#fadeTo").click(function () {
          $("#para").fadeTo(1000, 0.5); // 50% transparent
        });
      });
    </script>
  </body>
</html>
