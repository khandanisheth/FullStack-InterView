<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />

    <script
      src="https://code.jquery.com/jquery-3.7.1.js"
      integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        padding: 50px;
      }
    </style>
  </head>
  <body>
    <p class="d-inline-flex gap-1">
      <a href="http://yahoo.com" class="btn btn-primary">Yahoooo</a>
      <a href="http://google.com" class="btn btn-primary active" data-bs-toggle="button">Google</a>
    </p>
    <button type="button" class="btn" data-bs-toggle="button">Google button Hide</button>
    <script>
      $(document).ready(function () {
        $("button").click(function () {
          $("[href='http://google.com']").hide();
        });
      });
    </script>
  </body>
</html>
