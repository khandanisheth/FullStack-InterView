<!DOCTYPE html>
<html>
<head>
	<title></title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

	<script>
		$(document).ready(function()
		{
			$(".btn1").click(function()
			{
				$("p").animate({left:'900px'},5000);	

				$("p").animate({left:'10px'},5000);	

				
			});
		});

	</script>
</head>
<body>
<button class="btn1">btn1</button>


<p style="background-color: red;width: 100px;height:100px; border: 10px dotted green;position: absolute;"></p>
</body>
</html>
