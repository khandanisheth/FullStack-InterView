<!DOCTYPE html>
<html>
  <head>
    <title></title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script>
      $(document).ready(function () {
        $(".btn1").click(function () {
          alert($("p").text());
        });

        $(".btn2").click(function () {
          alert($("p").html());
        });

        $(".btn3").click(function () {
          alert($("#txtName").val());
        });
      });
    </script>
  </head>
  <body>
    <button class="btn1">text</button>
    <button class="btn2">html</button>
    <button class="btn3">value</button>

    <input type="text" id="txtName" />
    <p style="background-color: red; width: 100px; height: 100px; border: 10px dotted green; position: absolute">
      <i>Jai</i> <b>Shri</b> <u>Ram</u>
    </p>
  </body>
</html>
