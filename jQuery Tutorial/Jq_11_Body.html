<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>jQuery Scroll & Resize Events</title>

    <!-- ✅ jQuery CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
      }

      /* Scrollable div styling */
      #scrollBox {
        width: 100%;
        height: 200px;
        overflow: auto;
        border: 2px solid #000;
        background-color: #f5f5f5;
        padding: 15px;
      }

      /* Large content inside the div */
      .content {
        height: 600px;
        background: linear-gradient(to bottom, lightgray, white);
      }
    </style>

    <script>
      $(document).ready(function () {
        // ✅ 1. Scroll Event on <div>
        $("#scrollBox").scroll(function () {
          $("#scrollBox").css("background-color", "yellow");
          console.log("Div scrolled");
        });

        // ✅ 2. Resize Event on Window
        $(window).resize(function () {
          alert("Window size changed");
          $("body").css("background-color", "lightblue");
        });
      });
    </script>
  </head>
  <body>
    <h2>jQuery Scroll and Resize Event Demo</h2>

    <!-- ✅ Scrollable DIV -->
    <div id="scrollBox">
      <div class="content">
        <p>Scroll down inside this box to trigger scroll event.</p>
        <p>You can add more content here to make it scrollable.</p>
      </div>
    </div>

    <br />
    <p>Now try resizing the browser window to trigger the resize event.</p>
  </body>
</html>
