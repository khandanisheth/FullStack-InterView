<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus and Blur Example</title>

    <!-- ✅ Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />

    <!-- ✅ jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script>
      $(document).ready(function () {
        // 🔵 Button pe focus aate hi even rows hide hongi
        $(".btnClick").focus(function () {
          $("tr:even").hide();
        });

        // 🔵 Focus hatne (blur) par even rows show ho jayengi
        $(".btnClick").blur(function () {
          $("tr:even").show();
        });
      });
    </script>
  </head>
  <body class="bg-light p-4">
    <!-- 🔘 Bootstrap styled button -->
    <button class="btn btn-success btnClick mb-3">Focus/Blur Button</button>
    <!-- 🔘 Bootstrap styled table -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover" id="tbl1">
        <thead class="thead-dark">
          <tr>
            <th>Name</th>
            <th>City</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1Name</td>
            <td>City1</td>
          </tr>
          <tr>
            <td>2Name</td>
            <td>City2</td>
          </tr>
          <tr>
            <td>3Name</td>
            <td>City3</td>
          </tr>
          <tr>
            <td>4Name</td>
            <td>City4</td>
          </tr>
          <tr>
            <td>5Name</td>
            <td>City5</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
