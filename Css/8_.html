<!DOCTYPE html>
<html>
<head>
  <title>CSS Transitions All Properties</title>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background: red;
      margin: 10px 0;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      /* Common transition setup: kis property pe, kitni duration, timing-function, delay */
      transition-property: width, background;
      transition-duration: 2s;
      transition-delay: 0s;
    }

    /* Alag alag timing-functions */

    #box1 { transition-timing-function: linear; }
    #box2 { transition-timing-function: ease; }
    #box3 { transition-timing-function: ease-in; }
    #box4 { transition-timing-function: ease-out; }
    #box5 { transition-timing-function: ease-in-out; }
    #box6 { transition-timing-function: cubic-bezier(0.68, -0.55, 0.27, 1.55); }

    /* Hover pe width aur background color badlega */
    .box:hover {
      width: 300px;
      background: green;
    }
  </style>
</head>
<body>

  <h2>CSS Transitions All Properties Example</h2>
  <p>Hover over each box to see different timing-functions:</p>

  <div id="box1" class="box">linear</div>
  <div id="box2" class="box">ease (default)</div>
  <div id="box3" class="box">ease-in</div>
  <div id="box4" class="box">ease-out</div>
  <div id="box5" class="box">ease-in-out</div>
  <div id="box6" class="box">cubic-bezier</div>

</body>
</html>
