<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Default Styles */
      .container {
        display: flex;
        flex-wrap: wrap;
        margin: 0 auto;
        width: 100%;
        max-width: 1200px;
      }

      .item {
        flex: 1 0 300px;  /* 300px minimum size for each item */
        padding: 10px;
        text-align: center;
        background-color: lightcoral;
        margin: 10px;
      }

      /* For Mobile */
      @media (max-width: 600px) {
        .item {
          flex: 1 0 100%;  /* 100% width on mobile devices */
        }
      }

      /* For Tablets */
      @media (min-width: 601px) and (max-width: 1024px) {
        .item {
          flex: 1 0 45%;  /* 2 items per row on tablet */
        }
      }

      /* For Larger Screens (Desktop) */
      @media (min-width: 1025px) {
        .item {
          flex: 1 0 22%;  /* 4 items per row on large screens */
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Item 1</div>
      <div class="item">Item 2</div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item">Item 6</div>
    </div>
  </body>
</html>
