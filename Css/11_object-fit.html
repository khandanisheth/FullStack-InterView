<!DOCTYPE html>
<html>
<head>
  <title>CSS object-fit Examples</title>
  <style>
    .container {
      width: 300px;
      height: 200px;
      border: 2px solid #333;
      margin: 10px 0;
      overflow: hidden;
    }

    .container img {
      width: 100%;
      height: 100%;
    }

    /* Alag alag object-fit values */

    .fill img {
      object-fit: fill;
    }

    .contain img {
      object-fit: contain;
    }

    .cover img {
      object-fit: cover;
    }

    .none img {
      object-fit: none;
    }

    .scaledown img {
      object-fit: scale-down;
    }
  </style>
</head>
<body>

  <h2>object-fit: fill</h2>
  <div class="container fill">
    <img src="images.jpg" alt="Example Image">
  </div>

  <h2>object-fit: contain</h2>
  <div class="container contain">
    <img src="images.jpg" alt="Example Image">
  </div>

  <h2>object-fit: cover</h2>
  <div class="container cover">
    <img src="images.jpg" alt="Example Image">
  </div>

  <h2>object-fit: none</h2>
  <div class="container none">
    <img src="images.jpg" alt="Example Image">
  </div>

  <h2>object-fit: scale-down</h2>
  <div class="container scaledown">
    <img src="images.jpg" alt="Example Image">
  </div>

</body>
</html>
