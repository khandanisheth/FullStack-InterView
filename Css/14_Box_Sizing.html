<!DOCTYPE html>
<html>
<head>
  <style>
    .box1 {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      background: lightblue;
      box-sizing: content-box;
    }

    .box2 {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      background: lightgreen;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <h2>Box-sizing Example</h2>

  <div class="box1">Content-box (default)</div>
  <br>
  <div class="box2">Border-box (recommended)</div>

</body>
</html>
